add_to_shopping:
  name: Add to Shopping List
  description: Add a product to the EverShelf shopping list. If the item already exists, the quantity is increased by this amount.
  fields:
    name:
      name: Product name
      description: Name of the product to add.
      required: true
      example: "Milk"
      selector:
        text:
    quantity:
      name: Quantity
      description: Amount to add (optional).
      required: false
      example: 2
      selector:
        number:
          min: 0.001
          max: 9999
          step: 0.1
    unit:
      name: Unit
      description: "Unit of measurement (optional, e.g. pz, kg, l)."
      required: false
      example: "l"
      selector:
        text:

mark_used:
  name: Mark as Used
  description: Reduce the stock of an inventory item by a given quantity.
  fields:
    name:
      name: Product name
      description: Name of the inventory item (case-insensitive match).
      required: true
      example: "Olive Oil"
      selector:
        text:
    quantity:
      name: Quantity used
      description: Amount to subtract from the current stock.
      required: true
      example: 1
      selector:
        number:
          min: 0.001
          max: 9999
          step: 0.001
    unit:
      name: Unit
      description: Unit of measurement (informational only, must match the item's unit in EverShelf).
      required: false
      example: "l"
      selector:
        text:

refresh:
  name: Refresh Data
  description: Force an immediate refresh of all EverShelf sensor data.

suggest_recipe:
  name: Suggest Recipe
  description: Ask EverShelf AI to suggest a recipe using items expiring soonest.
  fields:
    location:
      name: Location
      description: Pantry location to focus on (e.g. frigo, freezer, spice_rack, cabinet). Leave empty for all locations.
      required: false
      example: "frigo"
      selector:
        text:

refresh_prices:
  name: Refresh Prices
  description: Recompute the shopping list estimated total from the existing price cache (no AI calls).

clear_expired:
  name: Clear Expired
  description: Remove expired inventory rows with zero stock from EverShelf.

list_inventory:
  name: List Inventory
  description: Return current EverShelf inventory rows, optionally filtered by location.
  fields:
    location:
      name: Location
      description: Optional inventory location to return.
      required: false
      selector:
        select:
          options:
            - label: Pantry
              value: dispensa
            - label: Fridge
              value: frigo
            - label: Freezer
              value: freezer
            - label: Spice Rack
              value: spice_rack
            - label: Cabinet
              value: cabinet
            - label: Other
              value: altro
    config_entry_id:
      name: Config entry
      description: Optional EverShelf config entry ID when multiple EverShelf instances are configured.
      required: false
      selector:
        text:

resolve_barcode:
  name: Resolve Barcode
  description: Resolve a scanned barcode through EverShelf and return matching product data.
  fields:
    barcode:
      name: Barcode
      description: Barcode digits to resolve.
      required: true
      example: "3017620422003"
      selector:
        text:
    config_entry_id:
      name: Config entry
      description: Optional EverShelf config entry ID when multiple EverShelf instances are configured.
      required: false
      selector:
        text:

read_expiry_image:
  name: Read Expiry Image
  description: Send an expiry-label image to EverShelf OCR/Gemini and return the parsed expiry date.
  fields:
    image:
      name: Base64 image
      description: Base64-encoded JPEG/PNG image data, with or without a data:image/... prefix. Provide exactly one image source.
      required: false
      selector:
        text:
          multiline: true
    image_path:
      name: Image path
      description: Path to an image file on the Home Assistant host. The path must be allowed by Home Assistant.
      required: false
      example: "/config/www/evershelf-expiry.jpg"
      selector:
        text:
    camera_entity_id:
      name: Camera entity
      description: Camera entity to capture and send. Provide exactly one image source.
      required: false
      selector:
        entity:
          domain: camera
    config_entry_id:
      name: Config entry
      description: Optional EverShelf config entry ID when multiple EverShelf instances are configured.
      required: false
      selector:
        text:

add_scanned_item:
  name: Add Scanned Item
  description: Save a scanned product if needed and add it to EverShelf inventory. Matching unopened inventory batches merge only when product, location, expiry date, and sealed state match.
  fields:
    product_id:
      name: Product ID
      description: Existing EverShelf product ID. When omitted, the service creates or merges a product first.
      required: false
      selector:
        number:
          min: 1
          mode: box
    name:
      name: Product name
      description: Product name to save or add.
      required: true
      example: "Milk"
      selector:
        text:
    barcode:
      name: Barcode
      description: Scanned product barcode.
      required: false
      example: "3017620422003"
      selector:
        text:
    brand:
      name: Brand
      description: Product brand.
      required: false
      selector:
        text:
    category:
      name: Category
      description: Product category.
      required: false
      selector:
        text:
    image_url:
      name: Image URL
      description: Product image URL from barcode lookup.
      required: false
      selector:
        text:
    quantity:
      name: Quantity
      description: Quantity to add to the matching inventory batch.
      required: false
      default: 1
      selector:
        number:
          min: 0.001
          max: 100000
          step: 0.001
          mode: box
    location:
      name: Location
      description: Inventory location.
      required: false
      default: dispensa
      selector:
        select:
          options:
            - dispensa
            - frigo
            - freezer
            - spice_rack
            - cabinet
            - altro
    expiry_date:
      name: Expiry date
      description: Expiration date in YYYY-MM-DD format. Different dates create separate unopened inventory batches.
      required: false
      example: "2026-06-30"
      selector:
        date:
    unit:
      name: Unit
      description: Product unit such as pz, kg, or l.
      required: false
      selector:
        text:
    default_quantity:
      name: Default quantity
      description: Default package quantity for newly saved products.
      required: false
      selector:
        number:
          min: 0
          step: 0.001
          mode: box
    package_unit:
      name: Package unit
      description: Package unit for configurable packages.
      required: false
      selector:
        text:
    package_size:
      name: Package size
      description: Package size for configurable packages.
      required: false
      selector:
        number:
          min: 0
          step: 0.001
          mode: box
    vacuum_sealed:
      name: Vacuum sealed
      description: Whether the added inventory row is vacuum sealed.
      required: false
      default: false
      selector:
        boolean:
    expiry_user_set:
      name: Expiry user set
      description: Whether the expiry date was explicitly supplied by the user or scanner flow.
      required: false
      selector:
        boolean:
    config_entry_id:
      name: Config entry
      description: Optional EverShelf config entry ID when multiple EverShelf instances are configured.
      required: false
      selector:
        text:
