add_to_shopping:
  name: Add to Shopping List
  description: Add a product to the EverShelf shopping list.
  fields:
    name:
      name: Product name
      description: Name of the product to add.
      required: true
      example: "Milk"
      selector:
        text:
    quantity:
      name: Quantity
      description: Amount to add (optional).
      required: false
      example: 2
      selector:
        number:
          min: 0
          max: 9999
          step: 0.1
    unit:
      name: Unit
      description: "Unit of measurement (optional, e.g. pz, kg, l)."
      required: false
      example: "l"
      selector:
        text:

mark_used:
  name: Mark as Used
  description: Reduce the stock of an inventory item by a given quantity.
  fields:
    name:
      name: Product name
      description: Name of the inventory item (case-insensitive match).
      required: true
      example: "Olive Oil"
      selector:
        text:
    quantity:
      name: Quantity used
      description: Amount to subtract from the current stock.
      required: true
      example: 1
      selector:
        number:
          min: 0.001
          max: 9999
          step: 0.001
    unit:
      name: Unit
      description: Unit of measurement (informational only, must match the item's unit in EverShelf).
      required: false
      example: "l"
      selector:
        text:

refresh:
  name: Refresh Data
  description: Force an immediate refresh of all EverShelf sensor data.

suggest_recipe:
  name: Suggest Recipe
  description: Ask EverShelf AI to suggest a recipe using items expiring soonest.
  fields:
    location:
      name: Location
      description: Pantry location to focus on (e.g. frigo, freezer). Leave empty for all locations.
      required: false
      example: "frigo"
      selector:
        text:

refresh_prices:
  name: Refresh Prices
  description: Recompute the shopping list estimated total from the existing price cache (no AI calls).

clear_expired:
  name: Clear Expired
  description: Remove expired inventory rows with zero stock from EverShelf.

